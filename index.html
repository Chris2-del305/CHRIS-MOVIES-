<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chris Movies</title><style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#141414;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#e50914;
font-size:22px;
font-weight:bold;
}

.menu{
font-size:28px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1c1c1c;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card p{
padding:10px;
font-size:14px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.player{
width:90%;
max-width:800px;
}

.player video,
.player iframe{
width:100%;
}

.admin{
position:fixed;
bottom:20px;
right:20px;
background:#e50914;
color:white;
border:none;
padding:15px;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

.panel{
position:fixed;
top:0;
right:-100%;
width:300px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
overflow:auto;
}

.panel input{
width:100%;
padding:10px;
margin-bottom:10px;
background:#222;
border:none;
color:white;
}

.panel button{
width:100%;
padding:10px;
background:#e50914;
border:none;
color:white;
}
</style></head><body><header>
<div class="logo">Chris Movies</div>
<div class="menu" onclick="openAdmin()">⋮</div>
</header><div class="grid" id="movies"></div><div class="modal" id="playerModal">
<div class="player" id="player"></div>
</div><button class="admin" onclick="openAdmin()">+</button>

<div class="panel" id="adminPanel"><h3>Add Movie</h3><input id="name" placeholder="Movie name"><input id="poster" placeholder="Poster image URL"><input id="video" placeholder="Video URL (MP4 or Google Drive)"><button onclick="addMovie()">Add Movie</button>

</div><script>

const STORAGE="chris_movies";

function loadMovies(){

let movies=JSON.parse(localStorage.getItem(STORAGE))||[];

const grid=document.getElementById("movies");
grid.innerHTML="";

movies.forEach(m=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${m.poster}">
<p>${m.title}</p>
`;

card.onclick=()=>playMovie(m.video);

grid.appendChild(card);

});

}

function playMovie(url){

const modal=document.getElementById("playerModal");
const player=document.getElementById("player");

player.innerHTML="";

if(url.includes("drive.google.com")){

let id=url.split("/d/")[1];
id=id.split("/")[0];

let iframe=document.createElement("iframe");
iframe.src="https://drive.google.com/file/d/"+id+"/preview";

player.appendChild(iframe);

}else{

let video=document.createElement("video");
video.src=url;
video.controls=true;
video.autoplay=true;

player.appendChild(video);

}

modal.style.display="flex";

}

document.getElementById("playerModal").onclick=()=>{
document.getElementById("playerModal").style.display="none";
document.getElementById("player").innerHTML="";
}

function addMovie(){

let title=document.getElementById("name").value;
let poster=document.getElementById("poster").value;
let video=document.getElementById("video").value;

if(!title||!poster||!video){
alert("Fill everything");
return;
}

let movies=JSON.parse(localStorage.getItem(STORAGE))||[];

movies.push({
title:title,
poster:poster,
video:video
});

localStorage.setItem(STORAGE,JSON.stringify(movies));

loadMovies();

alert("Movie added");

}

function openAdmin(){

let pass=prompt("Admin password");

if(pass==="admin123"){
document.getElementById("adminPanel").style.right="0";
}else{
alert("Wrong password");
}

}

loadMovies();

</script></body>
</html>
